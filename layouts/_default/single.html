{{ define "main" }}
<article class="bg-background py-24 sm:py-32">
  <div class="mx-auto max-w-3xl px-4 sm:px-6 lg:px-8">
    <div class="prose prose-invert lg:prose-lg prose-p:text-muted-foreground prose-a:text-primary prose-a:no-underline hover:prose-a:underline prose-strong:text-foreground prose-headings:text-foreground prose-li:text-muted-foreground">
      <h1 class="text-pretty text-2xl md:text-3xl font-semibold tracking-tight leading-snug text-foreground">{{ .Title }}</h1>
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
