<div id="meet-the-artists" class="relative isolate overflow-hidden bg-card py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0">
      <h2 class="text-pretty text-2xl md:text-3xl font-semibold tracking-tight leading-snug text-foreground">
        {{ .Params.artists.title }}
      </h2>
      <p class="mt-6 text-lg leading-8 text-muted-foreground">
        {{ .Params.artists.description }}
      </p>
    </div>
    <div class="mt-16">
      <div class="aspect-video w-full max-w-3xl mx-auto rounded-xl overflow-hidden ring-1 ring-border">
        <iframe
          class="w-full h-full"
          src="{{ .Params.artists.youtube_playlist }}"
          title="406 Records Artist Interviews"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy"
        ></iframe>
      </div>
    </div>
  </div>
</div>
