<section id="contact-us" aria-labelledby="contact-heading" class="relative isolate bg-background pt-14">
  <div class="py-24 sm:py-32 lg:pb-40">
    <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-2xl text-center">
        <h2 id="contact-heading" class="text-pretty text-2xl md:text-3xl font-semibold tracking-tight leading-snug text-foreground">
          Let's Talk About Your Project
        </h2>
        <p class="mt-4 text-lg text-muted-foreground">Every project starts with a conversation. Tell us what you're working on.</p>
      </div>

      <form id="contact-form" class="mx-auto mt-12 max-w-xl rounded-3xl bg-card p-8 md:p-12 shadow-lg shadow-primary/5">
        <div class="grid gap-y-8">
          <div>
            <label for="name" class="block text-sm font-medium text-muted-foreground">Name</label>
            <div class="mt-2">
              <input
                type="text"
                name="name"
                id="name"
                autocomplete="name"
                aria-describedby="name-error"
                class="block w-full rounded-xl border border-border bg-input px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-ring focus:ring-1 focus:ring-ring transition-colors"
                required
                maxlength="80"
              >
            </div>
            <p id="name-error" class="mt-2 text-sm text-destructive hidden"></p>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-muted-foreground">Email</label>
            <div class="mt-2">
              <input
                type="email"
                name="email"
                id="email"
                autocomplete="email"
                aria-describedby="email-error"
                class="block w-full rounded-xl border border-border bg-input px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-ring focus:ring-1 focus:ring-ring transition-colors"
                required
              >
            </div>
            <p id="email-error" class="mt-2 text-sm text-destructive hidden"></p>
          </div>

          <div>
            <label for="phone" class="block text-sm font-medium text-muted-foreground">Phone</label>
            <div class="mt-2">
              <input
                type="tel"
                name="phone"
                id="phone"
                autocomplete="tel"
                aria-describedby="phone-error"
                class="block w-full rounded-xl border border-border bg-input px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-ring focus:ring-1 focus:ring-ring transition-colors"
                required
              >
            </div>
            <p id="phone-error" class="mt-2 text-sm text-destructive hidden"></p>
          </div>

          <div>
            <label for="project_type" class="block text-sm font-medium text-muted-foreground">Project Type</label>
            <div class="mt-2">
              <select
                name="project_type"
                id="project_type"
                aria-describedby="project_type-error"
                class="block w-full appearance-none rounded-xl border border-border bg-input px-4 py-3 pr-10 text-foreground focus:outline-none focus:border-ring focus:ring-1 focus:ring-ring transition-colors bg-[length:16px_16px] bg-[position:right_12px_center] bg-no-repeat bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22%23a1a1aa%22%3E%3Cpath%20fill-rule%3D%22evenodd%22%20d%3D%22M5.23%207.21a.75.75%200%20011.06.02L10%2011.168l3.71-3.938a.75.75%200%20111.08%201.04l-4.25%204.5a.75.75%200%2001-1.08%200l-4.25-4.5a.75.75%200%2001.02-1.06z%22%20clip-rule%3D%22evenodd%22%2F%3E%3C%2Fsvg%3E')]"
                required
              >
                <option value="" disabled selected class="text-muted-foreground">Select a project type</option>
                <option value="Recording">Recording</option>
                <option value="Mixing">Mixing</option>
                <option value="Mastering">Mastering</option>
                <option value="Full Production">Full Production</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <p id="project_type-error" class="mt-2 text-sm text-destructive hidden"></p>
          </div>

          <div>
            <label for="message" class="block text-sm font-medium text-muted-foreground">Tell us about your project</label>
            <div class="mt-2">
              <textarea
                name="message"
                id="message"
                rows="4"
                aria-describedby="message-error"
                class="block w-full rounded-xl border border-border bg-input px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-ring focus:ring-1 focus:ring-ring transition-colors"
                required
              ></textarea>
            </div>
            <p id="message-error" class="mt-2 text-sm text-destructive hidden"></p>
          </div>

          <!-- Cloudflare Turnstile -->
          <div class="cf-turnstile" data-sitekey="{{ site.Params.turnstileSiteKey }}" data-theme="dark"></div>
        </div>

        <div class="mt-10">
          <button
            type="submit"
            id="submit-btn"
            class="w-full rounded-xl bg-primary px-6 py-3.5 text-sm font-medium tracking-wide text-primary-foreground shadow-sm hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Get in Touch
          </button>
        </div>
        <div class="mt-6">
          <p id="form-success" role="status" aria-live="polite" class="text-success text-center hidden"></p>
          <p id="form-error" role="alert" aria-live="assertive" class="text-destructive text-center hidden"></p>
        </div>
      </form>
    </div>
  </div>
</section>

<!-- Cloudflare Turnstile script -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
