<div id="hero" class="relative isolate overflow-hidden">
  <!-- Full-bleed hero image with gradient overlay -->
  <div class="absolute inset-0">
    <img
      class="h-full w-full object-cover"
      src="{{ .Params.hero.image }}"
      alt="406 Records recording studio in Helena, Montana"
      fetchpriority="high"
    >
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-background/40"></div>
  </div>

  <div class="relative py-24 md:py-40">
    <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-2xl text-center">
        <h1 class="text-4xl font-bold tracking-tight text-foreground sm:text-6xl">
          {{ .Params.hero.headline }}
        </h1>
        <p class="mt-6 text-lg leading-8 text-muted-foreground">
          {{ .Params.hero.description }}
        </p>

        <div class="mt-10 flex items-center justify-center gap-x-6">
          {{ range .Params.hero.buttons }}
          {{ if eq .style "primary" }}
          <a
            href="{{ .href }}"
            class="rounded-lg bg-primary px-6 py-3 text-sm font-medium tracking-wide text-primary-foreground shadow-sm hover:bg-[#E8C06A] focus:outline-none focus:ring-2 focus:ring-[#D4A853] focus:ring-offset-2 focus:ring-offset-[#131211] transition-colors"
          >{{ .text }}</a>
          {{ else }}
          <a
            href="{{ .href }}"
            class="rounded-lg border border-[#D4A853] px-6 py-3 text-sm font-medium tracking-wide text-[#D4A853] hover:bg-[#D4A853]/10 focus:outline-none focus:ring-2 focus:ring-[#D4A853] focus:ring-offset-2 focus:ring-offset-[#131211] transition-colors"
          >{{ .text }}</a>
          {{ end }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</div>
