<div id="hero" class="relative isolate overflow-hidden">
  <!-- Full-bleed hero image with gradient overlay -->
  <div class="absolute inset-0">
    <img
      class="h-full w-full object-cover"
      src="{{ .Params.hero.image }}"
      alt="406 Records recording studio in Helena, Montana"
      fetchpriority="high"
    >
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-background/40"></div>
  </div>

  <div class="relative py-32 sm:py-40 lg:py-48">
    <div class="mx-auto max-w-7xl px-6 lg:px-8">
      <div class="mx-auto max-w-2xl text-center">
        <h1 class="text-4xl font-bold tracking-tight text-foreground sm:text-6xl">
          {{ .Params.hero.headline }}
        </h1>
        <p class="mt-6 text-lg leading-8 text-muted-foreground">
          {{ .Params.hero.description }}
        </p>

        <div class="mt-10 flex items-center justify-center gap-x-6">
          {{ range .Params.hero.buttons }}
          {{ if eq .style "primary" }}
          <a
            href="{{ .href }}"
            class="rounded-md bg-primary px-5 py-3 text-sm font-semibold text-primary-foreground shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
          >{{ .text }}</a>
          {{ else }}
          <a
            href="{{ .href }}"
            class="rounded-md border border-primary/50 px-5 py-3 text-sm font-semibold text-primary hover:bg-primary/10 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
          >{{ .text }}</a>
          {{ end }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</div>
