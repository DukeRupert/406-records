<section id="hero" aria-labelledby="hero-heading" class="relative isolate overflow-hidden">
  <!-- Full-bleed hero image with gradient overlay -->
  <div class="absolute inset-0">
    {{- $src := resources.Get .Params.hero.image -}}
    {{- $fallback := $src.Resize "1920x jpg" -}}
    <picture>
      <source
        type="image/webp"
        srcset="
          {{ ($src.Resize "640x webp").RelPermalink }} 640w,
          {{ ($src.Resize "1024x webp").RelPermalink }} 1024w,
          {{ ($src.Resize "1536x webp").RelPermalink }} 1536w,
          {{ ($src.Resize "1920x webp").RelPermalink }} 1920w"
        sizes="100vw"
      >
      <img
        class="h-full w-full object-cover"
        src="{{ $fallback.RelPermalink }}"
        alt="406 Records recording studio in Helena, Montana"
        width="{{ $fallback.Width }}"
        height="{{ $fallback.Height }}"
        fetchpriority="high"
      >
    </picture>
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-background/40"></div>
  </div>

  <div class="relative py-24 md:py-40">
    <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
      <div class="mx-auto max-w-2xl text-center">
        <h1 id="hero-heading" class="text-4xl font-bold tracking-tight text-foreground sm:text-6xl">
          {{ .Params.hero.headline }}
        </h1>
        <p class="mt-6 text-lg leading-8 text-muted-foreground">
          {{ .Params.hero.description }}
        </p>

        <div class="mt-10 flex flex-wrap items-center justify-center gap-x-6 gap-y-4">
          {{ range .Params.hero.buttons }}
          {{ if eq .style "primary" }}
          <a
            href="{{ .href }}"
            class="rounded-lg bg-primary px-6 py-3 text-sm font-medium tracking-wide text-primary-foreground shadow-sm hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background transition-colors"
          >{{ .text }}</a>
          {{ else }}
          <a
            href="{{ .href }}"
            class="rounded-lg border border-primary px-6 py-3 text-sm font-medium tracking-wide text-primary hover:bg-primary/10 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 focus:ring-offset-background transition-colors"
          >{{ .text }}</a>
          {{ end }}
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</section>
