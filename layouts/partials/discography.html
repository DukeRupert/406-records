<div id="discography" class="bg-card py-20 md:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0 mb-12">
      <h2 class="text-pretty text-2xl font-semibold tracking-tight text-foreground md:text-3xl">
        Discography
      </h2>
    </div>

    <!-- Album Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
      {{ range site.Data.albums }}
      <div class="bg-card rounded-xl overflow-hidden transition-transform duration-300 hover:scale-[1.02] hover:shadow-lg hover:shadow-primary/10">
        <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" aria-label="Listen to {{ .artist }}{{ with .album }} - {{ . }}{{ end }} on Spotify" class="block">
          <img
            class="aspect-square w-full object-cover"
            src="{{ .image }}"
            alt="Album cover for {{ .artist }}{{ with .album }} - {{ . }}{{ end }}"
            loading="lazy"
          >
        </a>
        <div class="p-4 md:p-6">
          <h3 class="text-lg font-semibold leading-8 tracking-tight text-foreground text-center">
            {{ .artist }}
          </h3>
          {{ with .album }}
          <p class="text-sm text-muted-foreground text-center">{{ . }}</p>
          {{ end }}
          <div class="mt-3 flex flex-wrap justify-center gap-2">
            {{ range .tags }}
            {{ if eq . "e" }}
            <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary tracking-wider uppercase ring-1 ring-inset ring-primary/20">engineered</span>
            {{ else if eq . "p" }}
            <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary tracking-wider uppercase ring-1 ring-inset ring-primary/20">produced</span>
            {{ else if eq . "mi" }}
            <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary tracking-wider uppercase ring-1 ring-inset ring-primary/20">mixed</span>
            {{ else if eq . "ma" }}
            <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary tracking-wider uppercase ring-1 ring-inset ring-primary/20">mastered</span>
            {{ end }}
            {{ end }}
          </div>
          <!-- Spotify embed -->
          {{ with .embed }}
          <div class="mt-4">
            <iframe
              style="border-radius:12px"
              src="{{ . }}"
              width="100%"
              height="152"
              frameBorder="0"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"
              title="Listen on Spotify"
            ></iframe>
          </div>
          {{ end }}
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</div>
