<div id="discography" class="bg-card py-24 sm:py-32 overflow-hidden">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0 mb-16">
      <h2 class="text-pretty text-4xl font-semibold tracking-tight text-foreground sm:text-5xl">
        Discography
      </h2>
    </div>

    <!-- Swiper Carousel -->
    <div class="swiper discography-swiper">
      <div class="swiper-wrapper pb-12">
        {{ range site.Data.albums }}
        <div class="swiper-slide">
          <div class="bg-card rounded-2xl p-4 transition-transform duration-300 hover:scale-[1.02]">
            <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" class="block">
              <img
                class="aspect-square w-full rounded-xl object-cover shadow-lg"
                src="{{ .image }}"
                alt="Album cover for {{ .artist }}{{ with .album }} - {{ . }}{{ end }}"
                loading="lazy"
              >
            </a>
            <h3 class="mt-4 text-lg font-semibold leading-8 tracking-tight text-foreground text-center">
              {{ .artist }}
            </h3>
            {{ with .album }}
            <p class="text-sm text-muted-foreground text-center italic">{{ . }}</p>
            {{ end }}
            <div class="mt-3 flex flex-wrap justify-center gap-2">
              {{ range .tags }}
              {{ if eq . "e" }}
              <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">engineered</span>
              {{ else if eq . "p" }}
              <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">produced</span>
              {{ else if eq . "mi" }}
              <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">mixed</span>
              {{ else if eq . "ma" }}
              <span class="inline-flex items-center rounded-md bg-primary/10 px-2 py-1 text-xs font-medium text-primary ring-1 ring-inset ring-primary/20">mastered</span>
              {{ end }}
              {{ end }}
            </div>
            <!-- Spotify embed -->
            {{ with .embed }}
            <div class="mt-4">
              <iframe
                style="border-radius:12px"
                src="{{ . }}"
                width="100%"
                height="152"
                frameBorder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                title="Listen on Spotify"
              ></iframe>
            </div>
            {{ end }}
          </div>
        </div>
        {{ end }}
      </div>
      <!-- Pagination dots -->
      <div class="swiper-pagination"></div>
    </div>
  </div>
</div>

<style>
  .discography-swiper {
    padding: 20px 0 60px;
  }

  .discography-swiper .swiper-slide {
    width: 320px;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .discography-swiper .swiper-slide-active {
    transform: scale(1.08);
    z-index: 10;
  }

  .discography-swiper .swiper-slide:not(.swiper-slide-active) {
    opacity: 0.6;
  }

  .discography-swiper .swiper-pagination-bullet {
    background: hsl(var(--muted-foreground));
    opacity: 0.5;
  }

  .discography-swiper .swiper-pagination-bullet-active {
    background: hsl(var(--primary));
    opacity: 1;
  }

  @media (min-width: 640px) {
    .discography-swiper .swiper-slide {
      width: 380px;
    }
  }

  @media (min-width: 1024px) {
    .discography-swiper .swiper-slide {
      width: 420px;
    }
  }
</style>
