<section id="faq" aria-labelledby="faq-heading" class="relative isolate overflow-hidden bg-background py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0">
      <h2 id="faq-heading" class="text-pretty text-2xl md:text-3xl font-semibold tracking-tight leading-snug text-foreground">
        {{ .Params.faq.title }}
      </h2>
    </div>

    <div class="mx-auto mt-16 max-w-3xl lg:mx-0">
      <dl class="space-y-4">
        {{ range .Params.faq.items }}
        <div class="rounded-xl bg-card ring-1 ring-border">
          <dt>
            <button
              type="button"
              class="faq-toggle flex w-full items-center justify-between px-6 py-5 text-left text-base font-medium text-foreground hover:text-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-background rounded-xl"
              aria-expanded="false"
            >
              <span>{{ .question }}</span>
              <svg class="faq-icon ml-4 h-5 w-5 shrink-0 text-muted-foreground transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14"/>
                <path d="M5 12h14"/>
              </svg>
            </button>
          </dt>
          <dd class="faq-answer hidden px-6 pb-5">
            <p class="text-sm leading-relaxed text-muted-foreground">{{ .answer }}</p>
          </dd>
        </div>
        {{ end }}
      </dl>
    </div>
  </div>
</section>
