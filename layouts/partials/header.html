<header class="bg-background">
  <nav class="mx-auto flex max-w-7xl items-center justify-between p-6 lg:px-8" aria-label="Global">
    <div class="flex lg:flex-1">
      <a href="/" class="-m-1.5 p-1.5">
        <span class="sr-only">406 Records</span>
        <img
          class="h-8 w-auto {{ if .IsHome }}invisible{{ end }}"
          src="/logo.png"
          alt="406 Records logo"
        >
      </a>
    </div>
    <div class="z-10 flex lg:hidden">
      <!-- Mobile menu button -->
      <button
        type="button"
        id="mobile-menu-button"
        class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-muted-foreground hover:text-foreground"
        aria-expanded="false"
        aria-controls="mobile-menu"
      >
        <span class="sr-only">Open main menu</span>
        <svg
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          aria-hidden="true"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
        </svg>
      </button>
    </div>
    <div class="hidden lg:flex lg:gap-x-12">
      {{ range site.Data.nav }}
      <a
        href="{{ .href }}"
        class="text-sm font-semibold capitalize leading-6 text-foreground hover:text-primary"
      >{{ .label }}</a>
      {{ end }}
    </div>
    <div class="hidden lg:flex lg:flex-1 lg:justify-end"></div>
  </nav>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden lg:hidden" role="dialog" aria-modal="true">
    <div id="mobile-menu-backdrop" class="fixed inset-0 z-10 bg-black/20"></div>
    <div id="mobile-menu-panel" class="fixed inset-y-0 right-0 z-10 w-full overflow-y-auto bg-card px-6 py-6 sm:max-w-sm sm:ring-1 sm:ring-border transform translate-x-full transition-transform duration-250 ease-out">
      <div class="flex items-center justify-between">
        <a href="/" class="-m-1.5 p-1.5">
          <span class="sr-only">406 Records</span>
          <img class="h-8 w-auto" src="/logo.png" alt="406 Records logo">
        </a>
        <button
          type="button"
          id="mobile-menu-close"
          class="-m-2.5 rounded-md p-2.5 text-muted-foreground"
        >
          <span class="sr-only">Close menu</span>
          <svg
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="mt-6 flow-root">
        <div class="-my-6 divide-y divide-border">
          <div class="space-y-2 py-6">
            {{ range site.Data.nav }}
            <a
              href="{{ .href }}"
              class="mobile-menu-link -mx-3 block rounded-lg px-3 py-2 text-base font-semibold capitalize leading-7 text-foreground hover:text-primary"
            >{{ .label }}</a>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
